services:
  # Backend API Service
  - type: web
    name: backtestgpt-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # Set in the Render dashboard - never commit this

  # Frontend Service
  - type: web
    name: backtestgpt-frontend
    runtime: node
    plan: free
    buildCommand: cd app && npm ci && npm run build
    startCommand: cd app && npm start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      # Bare hostname of the backend; the frontend prepends https://
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: backtestgpt-backend
          property: host
