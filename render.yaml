# Backend API only - the Next.js frontend is deployed on Vercel (see README)
services:
  - type: web
    name: backtestgpt-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # Set in the Render dashboard - never commit this
